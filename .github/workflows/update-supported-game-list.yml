name: Update Supported Game List

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *"

permissions:
  contents: write

concurrency:
  group: update-supported-game-list
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Seoul
      INSTALL_PROFILE_SHEET_URL: ${{ secrets.INSTALL_PROFILE_SHEET_URL }}
      GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      WIKI_PUSH_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN }}
      TARGET_WIKI_PAGE_FILE: Supported-Game-List.md
      BASELINE_WIKI_PAGE_FILE: Supported-Game-List.md
      NEW_GAMES_RETENTION_DAYS: "15"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: python -m pip install --disable-pip-version-check requests google-auth

      - name: Update wiki page and app data
        run: python scripts/update_supported_game_list.py

      - name: Commit generated app data
        run: |
          if git diff --quiet -- assets/data/new_game_support.json; then
            echo "No new game support JSON changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/data/new_game_support.json
          git commit -m "Update new game support data"
          git push
