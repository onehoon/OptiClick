name: Sync Google Sheets JSON

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-google-sheets-json
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service account credentials
        run: |
          cat > "$RUNNER_TEMP/google-service-account.json" <<'EOF'
          ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Generate JSON files from all Google Sheets tabs
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/google-service-account.json
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          OUTPUT_DIR: assets/data
        run: python scripts/sync_sheets_to_json.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- assets/data; then
            echo "No JSON changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/data
          git commit -m "Update JSON data from Google Sheets"
          git push
