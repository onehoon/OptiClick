name: Sync Google Sheets JSON

on:
  workflow_dispatch:
    inputs:
      sheets:
        description: "업데이트할 시트명. 쉼표로 구분. 비우면 기본 시트 목록 사용"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: sync-google-sheets-json
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service account credentials
        run: |
          cat > "$RUNNER_TEMP/google-service-account.json" <<'EOF'
          ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Generate JSON files from Google Sheets
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/google-service-account.json
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          DEFAULT_SHEET_NAMES: game_master,message_center,message_binding
          INPUT_SHEET_NAMES: ${{ github.event.inputs.sheets }}
          OUTPUT_DIR: assets/data
        run: python scripts/sync_sheets_to_json.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- assets/data; then
            echo "No JSON changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/data
          git commit -m "Update JSON data from Google Sheets"
          git push
